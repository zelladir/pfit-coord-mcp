services:
  coord-mcp:
    build: .
    image: pfit-coord-mcp:dev
    container_name: pfit-coord-mcp
    ports:
      # Open binding because deployment runs on a separate host (codeserver)
      # behind a reverse proxy. Bearer-token auth is the access control.
      # See docs/deployment-architecture.md.
      - "0.0.0.0:8765:8765"
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
    environment:
      COORD_CONFIG: /app/config.toml
      COORD_LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
